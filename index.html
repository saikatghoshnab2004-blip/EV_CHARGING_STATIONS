<!DOCTYPE html>
<html>

<head>

<title>Smart EV Charging Planning System - Kolkata</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f3;
}

header{
background:#0a7d3b;
color:white;
text-align:center;
padding:15px;
}

.tabs{
display:flex;
background:#0a7d3b;
}

.tabs button{
flex:1;
padding:12px;
border:none;
background:#0a7d3b;
color:white;
cursor:pointer;
font-size:16px;
}

.tabs button:hover{
background:#086a31;
}

.tabcontent{
display:none;
padding:20px;
}

.dashboard{
display:flex;
gap:20px;
flex-wrap:wrap;
margin:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:200px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card h2{
margin:0;
font-size:28px;
color:#0a7d3b;
}

.panel{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#map{
height:520px;
margin:20px;
border-radius:10px;
}

button{
padding:10px;
background:#0a7d3b;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#064d25;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
}

.contact-section{
background:#0a7d3b;
color:white;
text-align:center;
padding:20px;
margin:20px;
border-radius:10px;
}

</style>

</head>

<body>

<header>
<h2>Smart EV Charging Planning System</h2>
</header>

<div class="tabs">

<button onclick="openTab('login')">User Login</button>
<button onclick="checkLogin('main')">EV Charging System</button>
<button onclick="checkLogin('booking')">Slot Booking</button>
<button onclick="checkLogin('admin')">Admin Panel</button>
<button onclick="checkLogin('feedbackTab')">Reviews</button>

</div>

<!-- LOGIN -->

<div id="login" class="tabcontent" style="display:block">

<div class="panel">

<h3>User Details</h3>

<label>Name</label>
<input type="text" id="username">

<label>Email</label>
<input type="email" id="useremail">

<label>Mobile</label>
<input type="number" id="usermobile">

<button onclick="enterSystem()">Enter System</button>

<p id="loginMessage"></p>

</div>

</div>

<!-- MAIN SYSTEM -->

<div id="main" class="tabcontent">

<div class="dashboard">

<div class="card">
<p>⚡ Total Stations</p>
<h2 id="totalStations"></h2>
</div>

<div class="card">
<p>🔋 Battery</p>
<h2 id="batteryCard">50%</h2>
</div>

<div class="card">
<p>📍 Reachable</p>
<h2 id="reachableStations">0</h2>
</div>

</div>

<div class="panel">

<h3>Battery Control</h3>

<input type="range" min="10" max="100" value="50" id="battery">

<p>Battery Level: <span id="batteryValue">50</span>%</p>

<button onclick="findStations()">Find Charging Stations</button>

<p id="result"></p>

</div>

<div id="map"></div>

</div>

<!-- BOOKING -->

<div id="booking" class="tabcontent">

<div class="panel">

<h3>Book Charging Slot</h3>

<label>Select Station</label>
<select id="stationSelect"></select>

<label>Select Time</label>
<input type="time" id="slotTime">

<button onclick="bookSlot()">Book Slot</button>

<p id="bookingMessage"></p>

</div>

</div>

<!-- ADMIN -->

<div id="admin" class="tabcontent">

<div class="panel">

<h3>Add Charging Station</h3>

<label>Station Name</label>
<input type="text" id="stationName">

<button onclick="addStation()">Add Station</button>

<p id="adminMessage"></p>

</div>

</div>

<!-- FEEDBACK -->

<div id="feedbackTab" class="tabcontent">

<div class="panel">

<h3>User Ratings & Feedback</h3>

<select id="rating">
<option>⭐⭐⭐⭐⭐ Excellent</option>
<option>⭐⭐⭐⭐ Good</option>
<option>⭐⭐⭐ Average</option>
<option>⭐⭐ Poor</option>
<option>⭐ Very Poor</option>
</select>

<textarea rows="4" id="review"></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

<p id="feedbackMessage"></p>

</div>

<div class="contact-section">

<h3>Contact Support</h3>

<p>
<a href="mailto:evchargingstation4@gmail.com?subject=EV Charging System Support" style="color:white;">
✉ evchargingstation4@gmail.com
</a>
</p>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>

const sheetURL="https://script.google.com/macros/s/AKfycbxvr40KMuKjRFBE4VO_aWnHltWDRdi8-98iMsBvsBYbc8LD8iEvBEKPbhYwSOjb0fCBHQ/exec";

var loggedIn=false;

/* TAB SWITCH */

function openTab(tab){

var tabs=document.getElementsByClassName("tabcontent");

for(var i=0;i<tabs.length;i++){
tabs[i].style.display="none";
}

document.getElementById(tab).style.display="block";

setTimeout(function(){
map.invalidateSize();
},500);

}

/* LOGIN CHECK */

function checkLogin(tab){

if(!loggedIn){
alert("Please complete login first.");
openTab("login");
return;
}

openTab(tab);

}

/* LOGIN */

function enterSystem(){

var name=document.getElementById("username").value.trim();
var email=document.getElementById("useremail").value.trim();
var mobile=document.getElementById("usermobile").value.trim();

if(name=="" || email=="" || mobile==""){
alert("Please fill all details.");
return;
}

if(mobile.length!=10){
alert("Enter valid 10 digit mobile number.");
return;
}

fetch(sheetURL,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({name,email,mobile})
});

loggedIn=true;

document.getElementById("loginMessage").innerHTML="Welcome "+name;

openTab("main");

}

/* MAP */

var map=L.map('map').setView([22.5726,88.3639],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

/* DRIVER LOCATION */

var userLat=22.5726;
var userLng=88.3639;

var carIcon=L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/3774/3774278.png",
iconSize:[40,40]
});

var driverMarker=L.marker([userLat,userLng],{icon:carIcon})
.addTo(map)
.bindPopup("Driver Location");

if(navigator.geolocation){

navigator.geolocation.watchPosition(function(pos){

userLat=pos.coords.latitude;
userLng=pos.coords.longitude;

driverMarker.setLatLng([userLat,userLng]);

map.setView([userLat,userLng],13);

});

}

/* STATIONS */

var stations=[

{name:"Sector V",lat:22.5760,lng:88.4330},
{name:"Gariahat",lat:22.5186,lng:88.3656},
{name:"Dhakuria",lat:22.5074,lng:88.3702},
{name:"Park Circus",lat:22.5416,lng:88.3727},
{name:"New Town",lat:22.5850,lng:88.4730},
{name:"Howrah",lat:22.5831,lng:88.3426}

];

stations.forEach(function(s){

L.marker([s.lat,s.lng])
.addTo(map)
.bindPopup(
"<b>"+s.name+"</b><br>"+
"<a target='_blank' href='https://www.google.com/maps/dir/?api=1&destination="+s.lat+","+s.lng+"'>Navigate</a>"
);

});

document.getElementById("totalStations").innerHTML=stations.length;

/* BOOKING LIST */

var stationSelect=document.getElementById("stationSelect");

stations.forEach(function(s){

var option=document.createElement("option");
option.value=s.name;
option.text=s.name;

stationSelect.appendChild(option);

});

/* BATTERY */

document.getElementById("battery").addEventListener("input",function(){

var val=this.value;

document.getElementById("batteryValue").innerHTML=val;
document.getElementById("batteryCard").innerHTML=val+"%";

});

/* DISTANCE */

function getDistance(lat1,lon1,lat2,lon2){

var R=6371;

var dLat=(lat2-lat1)*Math.PI/180;
var dLon=(lon2-lon1)*Math.PI/180;

var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

var rangeCircle;
var routingControl;

/* FIND STATIONS */

function findStations(){

var battery=parseInt(document.getElementById("battery").value);

var range=battery*0.2;

if(rangeCircle){
map.removeLayer(rangeCircle);
}

rangeCircle=L.circle([userLat,userLng],{
color:"green",
fillOpacity:0.2,
radius:range*1000
}).addTo(map);

var reachable=[];

stations.forEach(function(s){

var d=getDistance(userLat,userLng,s.lat,s.lng);

var speed=30;
var time=(d/speed)*60;

var status;

if(d<=range*0.9){
status="<span style='color:green'>✔ Safe to Reach</span>";
}else{
status="<span style='color:red'>⚠ Battery May Not Reach</span>";
}

if(d<=range){

reachable.push({
name:s.name,
lat:s.lat,
lng:s.lng,
distance:d,
time:time,
status:status
});

}

});

reachable.sort(function(a,b){return a.distance-b.distance});

var html="";

reachable.forEach(function(s,i){

var nav="https://www.google.com/maps/dir/?api=1&destination="+s.lat+","+s.lng;

html+="<b>"+s.name+"</b> - "+s.distance.toFixed(2)+" km<br>";
html+="⏱ Approx Time: "+Math.round(s.time)+" minutes<br>";
html+=s.status+"<br>";
html+="<a href='"+nav+"' target='_blank'>🚗 Navigate</a><br><br>";

if(i==0){

if(routingControl){
map.removeControl(routingControl);
}

routingControl=L.Routing.control({

waypoints:[
L.latLng(userLat,userLng),
L.latLng(s.lat,s.lng)
],

lineOptions:{
styles:[{color:"green",weight:6}]
}

}).addTo(map);

}

});

document.getElementById("reachableStations").innerHTML=reachable.length;
document.getElementById("result").innerHTML=html;

}

/* BOOK SLOT */

function bookSlot(){

var station=document.getElementById("stationSelect").value;
var time=document.getElementById("slotTime").value;

fetch(sheetURL,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({station,time})
});

document.getElementById("bookingMessage").innerHTML="Slot booked at "+station;

}

/* ADMIN ADD STATION */

function addStation(){

var name=document.getElementById("stationName").value;

if(name==""){
alert("Enter station name");
return;
}

var lat=22.55 + Math.random()*0.1;
var lng=88.35 + Math.random()*0.1;

L.marker([lat,lng])
.addTo(map)
.bindPopup("⚡ "+name);

document.getElementById("adminMessage").innerHTML="Station added successfully";

}

/* FEEDBACK */

function submitFeedback(){

var rating=document.getElementById("rating").value;
var review=document.getElementById("review").value;

fetch(sheetURL,{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({rating,review})
});

document.getElementById("feedbackMessage").innerHTML="Thank you for your feedback!";

}

</script>

</body>
</html>
