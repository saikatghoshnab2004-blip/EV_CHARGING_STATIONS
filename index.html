<!DOCTYPE html>
<html>

<head>
<title>Smart EV Charging Planning System - Kolkata</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<style>
body{font-family:'Segoe UI';margin:0;background:#eef5f4;}
.tabcontent{display:none;}

header{
text-align:center;
padding:15px;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.tabs{display:flex;background:#004d40;}

.tabs button{
flex:1;
padding:12px;
border:none;
background:#004d40;
color:white;
font-weight:bold;
cursor:pointer;
}

.tabs button:hover{background:#00796b;}

.panel{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

.vehicle-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.vehicle{
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 0 10px rgba(0,0,0,0.1);
background:white;
}

.vehicle img{
width:100%;
height:100px;
object-fit:cover;
border-radius:8px;
}

#map{
height:500px;
margin:20px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
}

button{
padding:10px;
background:#009688;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.star{font-size:25px;cursor:pointer;color:gray;}
.star.active{color:gold;}
</style>
</head>

<body>

<header>
<h2>Smart EV Charging Planning System</h2>
</header>

<div class="tabs">
<button onclick="openTab('login')">Login</button>
<button onclick="checkLogin('vehicle')">Select Vehicle</button>
<button onclick="checkVehicle('main')">EV System</button>
<button onclick="checkVehicle('booking')">Booking</button>
<button onclick="checkVehicle('feedbackTab')">Feedback</button>
</div>

<!-- LOGIN -->
<div id="login" class="tabcontent" style="display:block">
<div class="panel">
<h3>Login</h3>
<input type="text" id="username" placeholder="Name">
<input type="email" id="useremail" placeholder="Email">
<input type="tel" id="usermobile" placeholder="Mobile">
<button onclick="loginAndEnter()">Enter</button>
</div>
</div>

<!-- VEHICLES -->
<div id="vehicle" class="tabcontent">
<div class="panel">
<h3>Select EV Vehicle</h3>

<div class="vehicle-grid">

<div class="vehicle" onclick="selectVehicle('Tesla Model 3',162,60)">
<img src="https://imgd.aeplcdn.com/1056x594/n/lnk9cva_1595893.jpg?q=80">
<p>Tesla Model 3</p>
</div>

<div class="vehicle" onclick="selectVehicle('Tata Nexon EV',120,40)">
<img src="https://imgd.aeplcdn.com/664x374/n/cw/ec/126681/nexon-ev-prime-exterior-right-front-three-quarter-2.jpeg">
<p>Tata Nexon EV</p>
</div>

<div class="vehicle" onclick="selectVehicle('MG ZS EV',175,50)">
<img src="https://img.autocarindia.com/ExtraImages/20220725051241_MG_ZS_EV.jpg">
<p>MG ZS EV</p>
</div>

<div class="vehicle" onclick="selectVehicle('Hyundai Kona EV',155,45)">
<img src="https://imgd.aeplcdn.com/664x374/n/cw/ec/37067/kona-electric.jpeg">
<p>Hyundai Kona EV</p>
</div>

<div class="vehicle" onclick="selectVehicle('Mahindra XUV400',150,39)">
<img src="https://imgd.aeplcdn.com/664x374/n/cw/ec/131179/xuv400.jpeg">
<p>Mahindra XUV400</p>
</div>

<div class="vehicle" onclick="selectVehicle('BYD Atto 3',160,60)">
<img src="https://imgd.aeplcdn.com/664x374/n/cw/ec/139851/atto-3.jpeg">
<p>BYD Atto 3</p>
</div>

<div class="vehicle" onclick="selectVehicle('Kia EV6',185,77)">
<img src="https://imgd.aeplcdn.com/664x374/n/cw/ec/144681/ev6.jpeg">
<p>Kia EV6</p>
</div>

<div class="vehicle" onclick="selectVehicle('Ather 450X',90,3.7)">
<img src="https://imgd.aeplcdn.com/310x174/n/cw/ec/124013/450x.jpeg">
<p>Ather 450X</p>
</div>

<div class="vehicle" onclick="selectVehicle('Ola S1 Pro',85,3.5)">
<img src="https://imgd.aeplcdn.com/310x174/n/cw/ec/124015/s1-pro.jpeg">
<p>Ola S1 Pro</p>
</div>

<div class="vehicle" onclick="selectVehicle('TVS iQube',80,3.2)">
<img src="https://imgd.aeplcdn.com/310x174/n/cw/ec/115571/iqube.jpeg">
<p>TVS iQube</p>
</div>

</div>
</div>
</div>

<!-- MAIN -->
<div id="main" class="tabcontent">
<div class="panel">
<input type="range" min="10" max="100" value="50" id="battery">
<p>Battery: <span id="batteryValue">50</span>%</p>
<button onclick="findStations()">Find Stations</button>
<p id="result"></p>
</div>
<div id="map"></div>
</div>

<!-- BOOKING -->
<div id="booking" class="tabcontent">
<div class="panel">
<select id="stationSelect"></select>
<input type="time" id="timeInput">
<button onclick="bookSlot()">Book Slot</button>
<p id="bookingMessage"></p>
</div>
</div>

<!-- FEEDBACK -->
<div id="feedbackTab" class="tabcontent">
<div class="panel">

<h3>Rate Us</h3>
<div id="stars">
<span class="star" onclick="rate(1)">★</span>
<span class="star" onclick="rate(2)">★</span>
<span class="star" onclick="rate(3)">★</span>
<span class="star" onclick="rate(4)">★</span>
<span class="star" onclick="rate(5)">★</span>
</div>

<textarea id="review"></textarea>
<button onclick="submitFeedback()">Submit</button>
<p id="feedbackMessage"></p>

<hr>

<h3>Contact Support</h3>
<p><a href="mailto:evchargingstation4@gmail.com">Email Us</a></p>
<p><a href="tel:+918250244327">Call 1</a></p>
<p><a href="tel:+917980919380">Call 2</a></p>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API="https://script.google.com/macros/s/AKfycbwgC89wO-Vb5H1mIXCZaq5w23SnlWAt-CTTIqcnoOvLe0MwstoHqJBwAqMMsDt9XerY/exec";

let loggedIn=false, vehicleSelected=false;
let map;
let rating=0;
let userLat=22.57, userLng=88.36;
let vehicleSpeed=40;

/* ✅ LOGIN FIXED */
function loginAndEnter(){

let name=document.getElementById("username").value;
let email=document.getElementById("useremail").value;
let mobile=document.getElementById("usermobile").value;

if(name==="" || email==="" || mobile===""){
alert("Fill all fields");
return;
}

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"login",
name:name,
email:email,
mobile:mobile
})
})
.then(()=>{

loggedIn=true;
alert("Login Successful ✅");
openTab("vehicle");

})
.catch(()=>{
alert("API Error ❌");
});
}

/* VEHICLE */
function selectVehicle(name,speed,batteryCap){
vehicleSelected=true;
vehicleSpeed=speed;

document.getElementById("battery").value=batteryCap;
document.getElementById("batteryValue").innerText=batteryCap;

openTab("main");
}

/* MAP */
function initMap(){
map=L.map('map').setView([userLat,userLng],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

/* FIND */
function findStations(){
if(!map) initMap();
document.getElementById("result").innerText="Stations loaded ✅";
}

/* BOOK */
function bookSlot(){
bookingMessage.innerText="Booked ✅";
}

/* FEEDBACK */
function submitFeedback(){
feedbackMessage.innerText="Submitted ✅";
}

/* UI */
function openTab(tab){
document.querySelectorAll(".tabcontent").forEach(t=>t.style.display="none");
document.getElementById(tab).style.display="block";
}

function checkLogin(tab){
if(!loggedIn){alert("Login first");return;}
openTab(tab);
}

function checkVehicle(tab){
if(!vehicleSelected){alert("Select vehicle");return;}
openTab(tab);
}

function rate(n){
rating=n;
document.querySelectorAll(".star").forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
}

</script>

</body>
</html>
